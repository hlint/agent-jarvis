# Local SearXNG inside Jarvis (no Valkey). Tune as needed.
# Runtime overrides: SEARXNG_SECRET, SEARXNG_BASE_URL, SEARXNG_PORT (see docs).
# Engine log noise: SEARXNG_ENGINE_LOG_LEVEL (see jarvis_searx_wsgi + searxng-run.sh).

use_default_settings: true

general:
  instance_name: "SearXNG"

server:
  limiter: false
  image_proxy: true

# Upstream defaults now only allow `html`; JSON/CSV/RSS must be listed or `/search?format=json` returns 403.
search:
  formats:
    - html
    - json
    - csv
    - rss
